[General]
LogPath=C:\ProgramData\BaselineProvisioning\baseline.log
BitLockerRecoveryKeyPath=C:\ProgramData\BaselineProvisioning\RecoveryKeys
NtpServer=time.windows.com,0x9

[Users]
LocalAdminDescription=Dedicated local administrator account
StandardUserDescription=Primary standard work account
DisableBuiltInAdministrator=true

[PasswordPolicy]
MinimumLength=12
Complexity=1
LockoutThreshold=5
LockoutDuration=15
LockoutWindow=15

[Screen]
InactivityTimeoutSeconds=600

[WindowsUpdate]
ActiveHoursStart=8
ActiveHoursEnd=18
NoAutoUpdate=0
AUOptions=4

[Defender]
EnableRealtimeProtection=true
EnableCloudProtection=true
EnableSampleSubmission=true
EnablePUAProtection=true
EnableControlledFolderAccess=false

[Firewall]
EnableDomainProfile=true
EnablePrivateProfile=true
EnablePublicProfile=true
DefaultInboundAction=Block
DefaultOutboundAction=Allow

[LegacyFeatures]
DisableSMB1=true
DisablePowerShellV2=true
DisableAutorun=true
DisableAutoplayForNonVolume=true

[UAC]
EnableLUA=1
ConsentPromptBehaviorAdmin=2
PromptOnSecureDesktop=1
FilterAdministratorToken=1

[SmartScreen]
EnableSmartScreen=1
ShellSmartScreenLevel=Block
ExplorerSmartScreenEnabled=Warn

[Auditing]
EnableLogonAudit=true
EnableProcessCreationAudit=true
IncludeProcessCommandLine=1

[Office]
ConfigureOfficePolicies=false
OfficeVersion=16.0
Apps=Word,Excel,PowerPoint,Outlook
VBAWarnings=3
BlockContentExecutionFromInternet=1
DisableInternetFilesInPV=0
DisableAttachmentsInPV=0
DisableTrustBar=1
DontUpdateLinks=1

[BitLocker]
EnableBitLocker=false
EncryptionMethod=XtsAes256
UseUsedSpaceOnly=true
RequireTPM=true
AddRecoveryPasswordProtector=true

[ScriptHandling]
ExecutionPolicy=RemoteSigned
AssociatePs1WithTxtFile=true

[SRP]
ConfigureSRP=false
DefaultLevel=0
PolicyScope=0
TransparentEnabled=1
AuthenticodeEnabled=0
ExecutableTypes=ADE,ADP,BAT,CHM,CMD,COM,CPL,EXE,HLP,HTA,INF,INS,ISP,LNK,MDB,MDE,MSC,MSI,MSP,MST,PIF,REG,SCR,SHS,URL,VB,WSC
AllowPaths=C:\Windows\*|C:\Program Files\*|C:\Program Files (x86)\*
BlockPaths=C:\Users\*\Downloads\*|C:\Users\*\Desktop\*|%TEMP%\*|C:\Windows\Temp\*
